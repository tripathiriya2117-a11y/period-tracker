<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Period Tracker</title>

<link rel="stylesheet" href="style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>

<div class="container">

    <h2>Period Tracker</h2>

    <div class="cycle-display">
        <div class="circle">
            <span id="cycleDay">--</span>
            <small>Day</small>
        </div>
        <p id="cycleInfo">Log 2 cycles for average</p>
    </div>

     <div class="today-mood">
  <p>Today's Mood</p>

  <div id="todayMood">--</div>

  <div class="mood-options">
    <button onclick="setTodayMood('happy')">😊</button>
    <button onclick="setTodayMood('neutral')">😐</button>
    <button onclick="setTodayMood('sad')">😞</button>
  </div>
</div>

    <p class="hint">Tap on dates to log your period</p>

    <div class="calendar-header">
        <button onclick="changeMonth(-1)">
            <i class="fas fa-chevron-left"></i>
        </button>

        <h3 id="monthYear">Month Year</h3>

        <button onclick="changeMonth(1)">
            <i class="fas fa-chevron-right"></i>
        </button>
    </div>

    <div class="weekdays">
        <div>Sun</div><div>Mon</div><div>Tue</div>
        <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>

    <div id="calendar" class="calendar"></div>

    <div class="prediction">
        <p id="nextPeriod">Next Period: --</p>
        <p id="lateStatus"></p>
    </div>

    <div class="insights">
        <p id="cycleInsights">Log data to see insights</p>
    </div>

    <button class="clear-btn" onclick="clearData()">Clear All Data</button>

</div>

<!-- Mood Popup -->


<script src="script.js"></script>

<!-- Chat Button -->
<div class="chat-btn" onclick="toggleChat()">
  💬
</div>

<!-- Chat Window -->
<script>
(function(){
if(!window.chatbase||window.chatbase("getState")!=="initialized"){
  window.chatbase=(...args)=>{
    if(!window.chatbase.q){window.chatbase.q=[]}
    window.chatbase.q.push(args)
  };
  window.chatbase=new Proxy(window.chatbase,{
    get(target,prop){
      if(prop==="q"){return target.q}
      return(...args)=>target(prop,...args)
    }
  })
}
const onLoad=function(){
  const script=document.createElement("script");
  script.src="https://www.chatbase.co/embed.min.js";
  script.id="9R9qVgqmywcu_yQabFiBH";
  script.domain="www.chatbase.co";
  document.body.appendChild(script)
};
if(document.readyState==="complete"){
  onLoad()
}else{
  window.addEventListener("load",onLoad)
}
})();
</script>
</body>
</html>
